# ============================================================================
# SKILLS_INDEX.yaml
# ----------------------------------------------------------------------------
# Master index of every Claude Code skill in this repo.
# READ THIS FILE FIRST before choosing a skill. Each entry tells you:
#   - name          : canonical skill name (matches folder + SKILL.md frontmatter)
#   - folder        : path to the skill directory
#   - activation    : slash command(s) that trigger it, if any
#   - triggers      : natural-language phrases a user might say
#   - use_when      : plain-text description of the situation it fits
#   - avoid_when    : (optional) situations where it's the WRONG choice
#   - examples      : short user-utterance examples with the correct pick
#   - category      : grouping label for quick scanning
#
# Quick category map:
#   agents-harness | engineering-ops | language-patterns | language-testing |
#   language-security | language-verification | frameworks | databases |
#   frontend | ios-swift | security | devops | docs-content | business |
#   learning-systems | tooling | workflows | integrations | research
# ============================================================================

meta:
  version: 1
  total_skills: 86
  maintainer: Oruga420
  read_before_use: true
  tip: >
    When the user's request is ambiguous, scan `triggers` and `examples` first.
    When the user types a slash, match against `activation`. Prefer the most
    specific skill. If nothing matches, fall back to `skill-shed` to search for
    more skills.

